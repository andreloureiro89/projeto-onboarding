<aside class="sidebar" [class.collapsed]="collapsed()">
  <div class="sidebar-top">
    <div class="sidebar-brand">
      <img *ngIf="auth.company()?.logo" [src]="auth.company()!.logo" alt="Company logo" class="brand-logo" />
      <span class="brand-name" *ngIf="!collapsed()">{{ auth.company()?.name ?? 'Onboarding' }}</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </span>
        <span class="nav-label" *ngIf="!collapsed()">Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/modules" routerLinkActive="active">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </span>
        <span class="nav-label" *ngIf="!collapsed()">Modules</span>
      </a>
      <a class="nav-item" routerLink="/progress" routerLinkActive="active">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </span>
        <span class="nav-label" *ngIf="!collapsed()">Progress</span>
      </a>
      <a class="nav-item" routerLink="/admin" routerLinkActive="active" *ngIf="auth.isAdmin()">
        <span class="nav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </span>
        <span class="nav-label" *ngIf="!collapsed()">Admin</span>
      </a>
    </nav>
  </div>

  <div class="sidebar-bottom">
    <button class="nav-item collapse-btn" (click)="toggleSidebar()">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed()">Collapse</span>
    </button>
    <div class="user-card" (click)="logout()">
      <div class="avatar">{{ getInitials(auth.user()?.name ?? 'U') }}</div>
      <div class="user-info" *ngIf="!collapsed()">
        <span class="user-name">{{ auth.user()?.name }}</span>
        <span class="user-role">{{ auth.isAdmin() ? 'Administrator' : 'Team Member' }}</span>
      </div>
      <span class="logout-icon" *ngIf="!collapsed()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </span>
    </div>
  </div>
</aside>
